# config.yaml for solver2048d

game:
  max_level: 11
  level_11_stone: true

# Multiplier mode parameters
# low_spawn: level of low spawn tile (e.g. 1 for x1, 3 for x4)
# high_spawn: level of high spawn tile (e.g. 2 for x1, 4 for x4)
modes:
  x1:
    energy_cost: 1
    low_spawn: 1
    high_spawn: 2
  x4:
    energy_cost: 4
    low_spawn: 3
    high_spawn: 4
  x8:
    energy_cost: 8
    low_spawn: 4
    high_spawn: 5
  x16:
    energy_cost: 16
    low_spawn: 5
    high_spawn: 6

# Probabilities for spawn events
# Note: 50% = 1 low, 35% = 2 low, 15% = 2 low + 1 high
spawn_probabilities:
  event_1_low: 0.50
  event_2_low: 0.35
  event_2_low_1_high: 0.15

# Policies: "truncated" (spawn as many as fit) or "invalid_event" (resample)
spawn_policy: "truncated"

# Appear points by spawn tile level
appear_points:
  1: 0
  2: 1
  3: 4
  4: 12
  5: 32
  6: 80
  7: 0
  8: 0
  9: 0
  10: 0
  11: 0
  12: 0
  13: 0
  14: 0
  15: 0

# Merge points by resulting level
merge_points:
  2: 1
  3: 2
  4: 4
  5: 8
  6: 16
  7: 30
  8: 50
  9: 100
  10: 150
  11: 200
  12: 300
  13: 400
  14: 500
  15: 600

# Solver / decision settings
decision:
  direct_conversion_value_per_energy: 2.0
  fresh_game_baseline_value_per_energy: 6.0

# Expectimax search depth & MC simulation budget
solver:
  expectimax_depth: 3
  max_time_ms: 1000
  mc_rollouts: 100
  mc_depth: 8
  risk_aversion: 2.0

# Heuristic weights for board evaluator
heuristics:
  weight_empty: 100.0
  weight_monotonicity: 50.0
  weight_smoothness: 20.0
  weight_corner: 200.0
  weight_stone_penalty: -150.0
  weight_unreachable_penalty: -80.0

# Client-Server Capture Agent Settings (V1)
capture:
  enabled: true
  port: 5000
  crop_x: 40
  crop_y: 900
  crop_w: 950
  crop_h: 880
  # Expected RGB colors for tile levels 0-11 in screenshots
  colors:
    0: [46, 46, 56]      # empty
    1: [79, 172, 254]    # x1 low
    2: [0, 242, 254]     # x1 high
    3: [76, 175, 80]     # x4 low
    4: [0, 230, 118]     # x4 high
    5: [255, 235, 59]
    6: [255, 152, 0]
    7: [255, 87, 34]
    8: [244, 67, 54]
    9: [213, 0, 249]
    10: [101, 31, 255]
    11: [55, 71, 79]     # stone

