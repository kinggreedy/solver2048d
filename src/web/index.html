<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solver 2048d — KDE Remote Desktop Helper (Web)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <!-- LEFT COLUMN: Board Panel -->
            <div class="panel">
                <div class="panel-title">Board View</div>
                
                <div class="stats-frame">
                    <div class="stat-item stat-score" id="score-val">Score: 0</div>
                    <div class="stat-item stat-energy" id="energy-val">Energy: 0</div>
                    <div class="stat-item" id="moves-val">Moves: 0</div>
                    <div class="stat-item stat-efficiency" id="efficiency-val">Pts/Energy: 0.0</div>
                </div>

                <div class="status-banner" id="status-banner">
                    STATUS: Edit board manually or apply moves
                </div>

                <div class="grid-frame" id="grid-container">
                    <!-- 16 cells generated by app.js -->
                </div>

                <div class="action-frame">
                    <span class="action-label">Apply Action:</span>
                    <button id="move-left">◀ LEFT</button>
                    <button id="move-up">▲ UP</button>
                    <button id="move-down">▼ DOWN</button>
                    <button id="move-right">RIGHT ▶</button>
                    <button id="apply-rec" class="btn-primary">⚡ Apply Recommended</button>
                </div>

                <div class="bottom-controls">
                    <button id="reset-btn" class="btn-reset">Reset Board</button>
                    <button id="new-game-btn" class="btn-new">New Game</button>
                    <button id="undo-btn">Undo</button>
                    <button id="confirm-spawn-btn" class="btn-confirm" disabled>Confirm Spawn</button>
                </div>
            </div>

            <!-- RIGHT COLUMN: Solver & Stats -->
            <div class="panel">
                <div class="panel-title solver-title">Solver Recommendation</div>
                
                <div class="settings-grid">
                    <label>Multiplier Mode:</label>
                    <select id="mode-select">
                        <option value="x1">X1 (Energy: 1)</option>
                        <option value="x4">X4 (Energy: 4)</option>
                        <option value="x8">X8 (Energy: 8)</option>
                        <option value="x16">X16 (Energy: 16)</option>
                    </select>

                    <div style="grid-column: span 2; display: flex; gap: 10px; font-weight: bold; font-size: 12px; color: var(--text-muted);">
                        <label><input type="checkbox" id="chk-x8"> X8</label>
                        <label><input type="checkbox" id="chk-x16"> X16</label>
                        <label><input type="checkbox" id="chk-empirical" checked> Use Empirical</label>
                    </div>

                    <label>Search Depth:</label>
                    <select id="depth-select">
                        <option value="dynamic">Dynamic (Balanced)</option>
                        <option value="2">Depth 2 (Fastest)</option>
                        <option value="3">Depth 3 (Fast)</option>
                        <option value="4">Depth 4 (Normal)</option>
                        <option value="5" selected>Depth 5 (Deep)</option>
                        <option value="6">Depth 6 (Thorough)</option>
                        <option value="7">Depth 7 (Ultimate)</option>
                    </select>

                    <label>Max Time:</label>
                    <select id="time-select">
                        <option value="500">500 ms</option>
                        <option value="1000">1000 ms</option>
                        <option value="2000">2000 ms</option>
                        <option value="5000">5000 ms</option>
                        <option value="10000">10000 ms</option>
                        <option value="0" selected>Unlimited</option>
                    </select>
                </div>

                <button id="solve-btn" style="width: 100%; margin-bottom: 15px;">Solve</button>


                <div class="rec-card">
                    <div class="rec-dir" id="rec-dir">NO RECOMMENDATION</div>
                    <div class="decision-badge" id="decision-badge">WAITING</div>
                    
                    <div class="rec-details">
                        <span>Expected Score (EV):</span>
                        <span class="val" id="ev-val">N/A</span>
                        
                        <span>EV Per Energy:</span>
                        <span class="val stat-efficiency" id="ev-energy-val">N/A</span>
                        
                        <span>Survival Score:</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="survival-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div style="font-size: 13px; font-weight: bold; color: var(--text-muted);">Why this move?</div>
                <div class="reasons-box" id="reasons-box">
                    Waiting for analysis...
                </div>
            </div>
        </main>
    </div>

    <!-- Initialization Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-text" style="color: var(--accent-blue); font-weight: bold;">Initializing Python Runtime...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
